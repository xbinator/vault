appId: com.texti.desktop
productName: Texti
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules/**/*"
  - node_modules/better-sqlite3/**/*
extraResources:
  - from: resources/icons
    to: icons
    filter:
      - "**/*"
asar: true
asarUnpack:
  - "**/*.node"
  - node_modules/better-sqlite3/**/*
mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  icon: resources/icons/app.png
windows:
  target:
    - nsis
    - portable
  icon: resources/icons/app.png
linux:
  target:
    - AppImage
    - deb
  icon: resources/icons/app.png
