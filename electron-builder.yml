appId: com.texti.desktop
productName: Texti
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules/**/*"
  - node_modules/better-sqlite3/**/*
asar: true
asarUnpack:
  - "**/*.node"
  - node_modules/better-sqlite3/**/*
mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  icon: build/icon.icns
windows:
  target:
    - nsis
    - portable
  icon: build/icon.ico
linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png
